  dynamic_research_slots.7.title:0 "Активация мода в текущей игре"
  dynamic_research_slots.7.desc:0 "Динамические ячейки исследований активированы в уже запущенной игре. Во избежание ошибок все страны инициализированы со стандартными ячейками и базовой исследовательской мощностью."
  dynamic_research_slots.7.a:0 "Понятно"

  dr_print_slots_summary_tooltip:0 "§H--- ПОДРОБНОСТИ СИСТЕМЫ ДИНАМИЧЕСКИХ ЯЧЕЕК ИССЛЕДОВАНИЙ ---§!\nВсего настроенных ячеек: §Y[?temp_size]§!\nЦелевые ячейки страны: §G[?target_research_slots]§!\nАктивные ячейки страны: §B[?current_research_slots]§!\nИсследовательская мощность страны: §O[?total_research_power]§!\n§H---------------------------------------------§!"
  dr_print_slots_summary_error_tooltip:0 "§H--- ПОДРОБНОСТИ СИСТЕМЫ ДИНАМИЧЕСКИХ ЯЧЕЕК ИССЛЕДОВАНИЙ ---§!\n§R[ОШИБКА] Система ещё не инициализирована полностью.§!\nДайте игре пройти хотя бы один день, прежде чем использовать эту команду.\n§H---------------------------------------------§!"

