  RULE_DR_SLOT_STABILITY_MODERATE:0 "Умеренный (14 дней)"
  RULE_DR_SLOT_STABILITY_MODERATE_DESC:0 "Ячейки удаляются только после 14 дней нахождения ниже порога. Получение ячеек по-прежнему мгновенное."
