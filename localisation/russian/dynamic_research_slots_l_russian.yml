l_russian:
  dynamic_research_slots_decisions:0 "Динамические ячейки исследований"
  dynamic_research_slots_decisions_desc:0 "§PНаши фабрики генерируют исследовательскую мощность (ИМ).§! Когда ИМ достигает определённых порогов, мы открываем больше ячеек исследований - но можем и потерять их, если ИМ упадёт слишком низко.\n\n§YОбщая ИМ: [?total_research_power]§!\n[GetDRCurrentSlotsInfo]\n[GetDRNextSlotInfo]\n[GetDRSlotLossInfo]\n\n§GИМ от гражданских фабрик:§! [?civilian_research_power]\n§RИМ от военных заводов:§! [?military_research_power]\n§CИМ от верфей:§! [?naval_research_power]\n§OИМ от экспериментальных объектов:§! [?facility_research_power]\n\n§YМодификаторы ИМ: [?total_rp_modifier|%+]§!\n§YЭффект войны / мира: [?war_rp_penalty_effective|%+]§!\n§YБонус альянса: [?alliance_bonus_pct|%+]§!\n\nИспользуйте решение \"ПОМОЩЬ\" для получения подробной информации."
  
  dynamic_research_slots_help:0 "ПОМОЩЬ"
  dynamic_research_slots.help.title:0 "Динамические ячейки исследований - Справка"
  dynamic_research_slots.help.desc:0 "§GИМ от гражданской фабрики:§! [?research_power_per_civ]\n§RИМ от военного завода:§! [?research_power_per_mil]\n§CИМ от верфи:§! [?research_power_per_nav]\n§OИМ от экспериментальных объектов:§! [?facility_research_power] (Физика: +30 ИМ, Морской/Воздушный/Наземный: +15 ИМ каждый, с убывающей отдачей)\n\n§PЛёгкие исследовательские ячейки:§! [?easy_research_slots]\n§WЛёгкие ячейки - это ячейки, с которыми мы начинаем (или получаем через фокусы и т.д.), порог ИМ для которых снижен до [?easy_research_slot_coefficient|%.0].§!\n\n§PПороги ИМ для ячеек исследований:§!\n§W1: [?research_for_slot^1] ИМ\n2: [?research_for_slot^2] ИМ\n3: [?research_for_slot^3] ИМ\n4: [?research_for_slot^4] ИМ\n5: [?research_for_slot^5] ИМ\n6: [?research_for_slot^6] ИМ\n7: [?research_for_slot^7] ИМ\n8: [?research_for_slot^8] ИМ\n9: [?research_for_slot^9] ИМ\n10: [?research_for_slot^10] ИМ§!\n\n§PДополнительная информация:§!\n§WНажмите \"Подробнее\" ниже, чтобы увидеть, как война, законы и альянсы изменяют вашу исследовательскую мощность.§!"
  
  dynamic_research_slots.help.a:0 "ОК"
  dynamic_research_slots.help.b:0 "Подробнее"
  
  dynamic_research_slots.1.title:0 "Изменение ячеек исследований"
  dynamic_research_slots.1.desc:0 "Из-за текущего уровня исследовательской мощности количество доступных исследовательских ячеек изменилось.\n\nПрежнее количество ячеек: [?current_research_slots|R]\nНовое количество ячеек: [?target_research_slots|G]"
  dynamic_research_slots.1.a:0 "Это справедливо... верно?"
  
  dynamic_research_slots.2.title:0 "Лёгкие исследовательские ячейки изменены"
  dynamic_research_slots.2.desc:0 "Вместо прямого добавления ячеек исследований, национальные фокусы теперь увеличивают количество \"лёгких исследовательских ячеек\", это ячейки, требования ИМ для которых снижены до [?easy_research_slot_coefficient|%.0].\n\nНовые лёгкие ячейки: [?temp|B]\nВсего лёгких ячеек: [?easy_research_slots|B]"
  dynamic_research_slots.2.a:0 "Идеальный баланс, всё как и должно быть."
  
  dynamic_research_slots.4.title:0 "Отладка динамических исследований"
  dynamic_research_slots.4.desc:0 "Текущая структура ИМ и внутренние переменные:\n\nОбщая ИМ: [?total_research_power]\nИМ от гражданских: [?civilian_research_power]\nИМ от военных: [?military_research_power]\nИМ от флота: [?naval_research_power]\nИМ от объектов: [?facility_research_power]\n\nТекущие ячейки: [?current_research_slots]\nЦелевые ячейки: [?target_research_slots]\nЛёгкие ячейки: [?easy_research_slots]\nКоэффициент лёгких ячеек: [?easy_research_slot_coefficient]\n\nТаймер событий игрока: [?dr_player_event_cooldown]\nТаймер обновления ИИ: [?dr_days_until_update]"
  dynamic_research_slots.4.a:0 "Закрыть"
  
  dynamic_research_slots.5.title:0 "Динамические ячейки исследований - Расширенные детали"
  dynamic_research_slots.5.desc:0 "§PЭффекты войны и мира:§!\n§WПравило игры «Исследования в период войны» устанавливает максимальный военный штраф к ИМ (например, -10%, -20%, -30%). Фактический штраф зависит от Поддержки Войны, Стабильности, популярности правящей партии, длительности войны и от того, является ли война наступательной или оборонительной. При оборонительных войнах штраф нарастает медленнее и в целом меньше.§!\n[GetDRWarRuleNote]\n\n§PЗаконы и исследовательская мощность:§!\n§WТорговые законы:§!\n- Свободная торговля: §G+2%§! ИМ\n- Приоритет - экспорт: §G+1%§! ИМ\n- Закрытая экономика: §R-1%§! ИМ\n\n§WЭкономические законы:§!\n- Гражданская Экономика: §G+2%§! ИМ\n- Ранняя Мобилизация: §G+1%§! ИМ\n- Военная Экономика: §R-1%§! ИМ\n- Всеобщая Мобилизация: §R-2%§! ИМ\n\n§WЗаконы о призыве:§!\n- Расширенный призыв: §R-2%§! ИМ\n- Обязательная служба: §R-4%§! ИМ\n- Все взрослые проходят службу: §R-7%§! ИМ\n- Всех под ружье: §R-10%§! ИМ\n[GetDRLawRuleNote]\n\n§PАльянсы:§!\n§WКаждый союзник может внести до §G+5%§! своей исследовательской мощности, с учётом отношений. Общий бонус альянса ограничен правилом Исследовательская мощность альянса.§!\n[GetDRAllianceRuleNote]"
  dynamic_research_slots.5.a:0 "Понял"
  
  EFFECT_ADD_RESEARCH_SLOT:0 "Добавить $COUNT|G$ к лёгким исследовательским ячейкам. (Лёгкие исследовательские ячейки - это ячейки с пониженным порогом ИМ, позволяющие странам проще достигать определённого числа ячеек исследований.)"
  EFFECT_REMOVE_RESEARCH_SLOT:0 "Убрать $COUNT|R$ из лёгких исследовательских ячеек. (Лёгкие исследовательские ячейки - это ячейки с пониженным порогом ИМ, позволяющие странам проще достигать определённого числа ячеек исследований.)"

  DR_EMPTY_LOC:0 ""
  
  DR_WAR_RULE_NOTE_OFF:0 "§YПримечание:§! Правило Исследования в период войны установлено на §Y\"Без изменений\"§!. В результате строка эффекта войны / мира в обзоре всегда будет показывать §Y0%§! и не влияет на исследовательскую мощность."
  DR_LAW_RULE_NOTE_OFF:0 "§YПримечание:§! Правило Модификаторы ИМ от законов установлено на §Y\"Отключено\"§!. Перечисленные выше модификаторы законов игнорируются; вклад в ИМ вносят только фабрики и экспериментальные объекты."
  DR_ALLIANCE_RULE_NOTE_OFF:0 "§YПримечание:§! Правило Исследовательская мощность альянса установлено на §Y\"Без бонуса\"§!. Строка бонуса альянса в обзоре всегда будет показывать §Y0%§! и не влияет на исследовательскую мощность."

